<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mk 11,24-26</title>
  <link rel="stylesheet" href="../style_verse.css">
</head>
<body>

  <a class="back-link" href="index.html">Zurück</a>

  <main>
    <article class="verse-card">
      <!-- extra corner accents -->
      <span class="verse-card__corners" aria-hidden="true"></span>

      <div class="verse-card__rule" aria-hidden="true">
        <span class="verse-card__rule-symbol">✦</span>
      </div>

      <span class="verse-card__quote-mark" aria-hidden="true">&ldquo;</span>

      <p class="verse-card__text">24 Therefore I tell you, whatever you ask for in prayer, believe that you have received it, and it will be yours. 25-26 And when you stand praying, if you hold anything against anyone, forgive them, so that your Father in heaven may forgive you your sins.’ </p>

      <footer class="verse-card__footer">
        <span class="verse-card__footer-line"></span>
        <span class="verse-card__reference">Mk 11,24-26</span>
      </footer>
    </article>
  </main>
