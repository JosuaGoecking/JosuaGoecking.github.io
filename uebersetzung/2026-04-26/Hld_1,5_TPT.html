<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hld 1,5 TPT</title>
  <link rel="stylesheet" href="../style_verse.css">
</head>
<body>

  <a class="back-link" href="index.html">Zurück</a>

  <main>
    <article class="verse-card">
      <!-- extra corner accents -->
      <span class="verse-card__corners" aria-hidden="true"></span>

      <div class="verse-card__rule" aria-hidden="true">
        <span class="verse-card__rule-symbol">✦</span>
      </div>

      <span class="verse-card__quote-mark" aria-hidden="true">&ldquo;</span>

      <p class="verse-card__text">5 Jerusalem maidens, in this twilight darkness  I know I am so unworthy—so in need. Yet you are so lovely! I feel as dark and dry as the desert tents of the wandering nomads. Yet you are so lovely— like the fine linen tapestry hanging in the Holy Place.</p>

      <footer class="verse-card__footer">
        <span class="verse-card__footer-line"></span>
        <span class="verse-card__reference">Hld 1,5 TPT</span>
      </footer>
    </article>
  </main>

</html>
